<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>VLESS Generator</title>
<style>
body{margin:0;background:#0b1220;color:#e7eefc;font-family:system-ui;padding:20px;}
.container{max-width:480px;margin:auto;background:#121b2f;padding:20px;border-radius:12px;border:1px solid rgba(94,234,212,.15);}
label{font-size:13px;margin-top:14px;display:block;color:#a9b4d0;}
input,select{width:100%;padding:10px;border-radius:8px;border:1px solid rgba(255,255,255,.15);background:rgba(0,0,0,.25);color:#e7eefc;margin-top:6px;}
.hidden{display:none;}
button{margin-top:16px;width:100%;padding:12px;border:0;border-radius:10px;background:#5eead4;color:#000;font-weight:700;cursor:pointer;}
.output{margin-top:20px;padding:14px;background:rgba(0,0,0,.3);border-radius:10px;word-break:break-all;}
.copy{margin-top:10px;width:100%;padding:10px;border-radius:8px;border:1px solid rgba(94,234,212,.25);background:rgba(94,234,212,.1);color:#5eead4;font-weight:600;cursor:pointer;}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#000;padding:10px 16px;border-radius:10px;display:none;}
.footer{margin-top:20px;text-align:center;font-size:12px;color:#a9b4d0;}
.footer a{color:#5eead4;text-decoration:none;}
.footer a:hover{text-decoration:underline;}
</style>
</head>
<body>

<div class="container">
<h2 style="text-align:center;margin:0 0 10px;">VLESS Link Generator</h2>

<label>UUID</label>
<input id="uuid">

<label>Netlify Domain</label>
<input id="domain">

<label>Backend Path</label>
<input id="path">

<label>SNI Domain</label>
<select id="sniSelect" onchange="toggleSni()">
<option value="kubernetes.io">kubernetes.io</option>
<option value="helm.sh">helm.sh</option>
<option value="letsencrypt.org">letsencrypt.org</option>
<option value="other">Other</option>
</select>
<input id="sniOther" class="hidden" placeholder="Custom SNI">

<label>Address (Host)</label>
<select id="addrSelect" onchange="toggleAddr()">
<option value="kubernetes.io">kubernetes.io</option>
<option value="helm.sh">helm.sh</option>
<option value="letsencrypt.org">letsencrypt.org</option>
<option value="other">Other</option>
</select>
<input id="addrOther" class="hidden" placeholder="Custom Address">

<label>Mark Name</label>
<input id="mark">

<button onclick="generate()">Generate</button>

<div id="output" class="output" style="display:none;"></div>
<button id="copyBtn" class="copy" style="display:none;" onclick="copyText()">Copy</button>

<div class="footer">
<p>Repository: <a href="https://github.com/hexyali/netlifyrelay-configgenerator-ui" target="_blank">GitHub</a></p>
</div>

</div>

<div class="toast" id="toast">Copied</div>

<script>
function toggleSni(){
  const s=document.getElementById('sniSelect');
  const o=document.getElementById('sniOther');
  o.classList.toggle('hidden',s.value!=='other');
  if(s.value!=='other')o.value='';
}
function toggleAddr(){
  const s=document.getElementById('addrSelect');
  const o=document.getElementById('addrOther');
  o.classList.toggle('hidden',s.value!=='other');
  if(s.value!=='other')o.value='';
}
function showToast(){
  const t=document.getElementById('toast');
  t.style.display='block';
  setTimeout(()=>t.style.display='none',1200);
}
function copyText(){
  const text=document.getElementById('output').innerText;
  navigator.clipboard.writeText(text).then(()=>showToast());
}
function generate(){
  const uuid=document.getElementById('uuid').value.trim();
  const domain=document.getElementById('domain').value.trim();
  const path=document.getElementById('path').value.trim();
  const mark=document.getElementById('mark').value.trim()||'net';

  let sni=document.getElementById('sniSelect').value;
  if(sni==='other')sni=document.getElementById('sniOther').value.trim();

  let addr=document.getElementById('addrSelect').value;
  if(addr==='other')addr=document.getElementById('addrOther').value.trim();

  if(!uuid||!domain||!path||!sni||!addr){alert('Please fill all fields');return;}

  const link=
`vless://${uuid}@${addr}:443?encryption=none&security=tls&sni=${domain}&fp=chrome&alpn=h2%2Chttp%2F1.1&insecure=0&allowInsecure=0&type=xhttp&host=${domain}&path=${path}&mode=auto&extra=%7B%22xPaddingBytes%22%3A%22100-1000%22%7D#${mark}`;

  const out=document.getElementById('output');
  out.style.display='block';
  out.innerText=link;

  document.getElementById('copyBtn').style.display='block';
}
</script>

</body>
</html>
